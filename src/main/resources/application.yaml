spring:
  application:
    name: api-biblioteca
  config:
    import: optional:classpath.env[.properties]

  datasource:
    url: jdbc:mysql://localhost:3306/biblioteca
    username: ${ENV_MYSQL_USER}
    password: ${ENV_MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

      show-sql: true

      properties:
        hibernates:
          format_sql: true
