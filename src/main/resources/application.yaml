spring:
  application:
    name: api-biblioteca
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:mysql://localhost:3306/biblioteca?createDataBaseIfNotExist=true
    username: ${ENV_MYSQL_USER}
    password: ${ENV_MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
        hibernate:
          format_sql: true
